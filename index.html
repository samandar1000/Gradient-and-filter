<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient and filter</title>
    <link rel="stylesheet" href="./style/main.css">
</head>

<body>
    <header class="">
        <div class="gradient container">
            <div class="linear-gradient size"></div>
            <div class="radial-gradient size"></div>
        </div>
        <div class="filter-items">
            <div class="filter-item container">
                <img src="./image/pexels-roberto-nickson-2559941.jpg" alt="blur" class="blur size">
                <img src="./image/pexels-roberto-nickson-2559941.jpg" alt="Asl nusxa" class="size">
            </div>
            <div class="filter-item container">
                <img src="./image/pexels-roberto-nickson-2559941.jpg" alt="brightness" class="brightness size">
                <img src="./image/pexels-roberto-nickson-2559941.jpg" alt="Asl nusxa" class="size">
            </div>
            <div class="filter-item container">
                <img src="./image/pexels-roberto-nickson-2559941.jpg" alt="contrast" class="contrast size">
                <img src="./image/pexels-roberto-nickson-2559941.jpg" alt="Asl nusxa" class="size">
            </div>
            <div class="filter-item container">
                <img src="./image/pexels-roberto-nickson-2559941.jpg" alt="grayscale" class="grayscale size">
                <img src="./image/pexels-roberto-nickson-2559941.jpg" alt="Asl nusxa" class="size">
            </div>
            <div class="filter-item container">
                <img src="./image/pexels-roberto-nickson-2559941.jpg" alt="huerotate" class="huerotate size">
                <img src="./image/pexels-roberto-nickson-2559941.jpg" alt="Asl nusxa" class="size">
            </div>
            <div class="filter-item container">
                <img src="./image/pexels-roberto-nickson-2559941.jpg" alt="invert" class="invert size">
                <img src="./image/pexels-roberto-nickson-2559941.jpg" alt="Asl nusxa" class="size">
            </div>
            <div class="filter-item container">
                <img src="./image/pexels-roberto-nickson-2559941.jpg" alt="opacity" class="opacity size">
                <img src="./image/pexels-roberto-nickson-2559941.jpg" alt="Asl nusxa" class="size">
            </div>

        </div>
    </header>
</body>

</html>
